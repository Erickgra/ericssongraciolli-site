<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ericssongraciolli.com</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  background: #0f0f0f;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
.container {
  text-align: center;
  padding: 2rem;
}
.dot {
  width: 8px;
  height: 8px;
  background: #7F77DD;
  border-radius: 50%;
  display: inline-block;
  margin: 0 3px;
  animation: blink 1.4s ease-in-out infinite;
}
.dot:nth-child(2) { animation-delay: .2s; }
.dot:nth-child(3) { animation-delay: .4s; }
@keyframes blink {
  0%, 80%, 100% { opacity: .15; }
  40% { opacity: 1; }
}
h1 {
  font-size: 13px;
  font-weight: 400;
  color: #555;
  letter-spacing: .18em;
  text-transform: uppercase;
  margin-bottom: 1.8rem;
}
p {
  font-size: 12px;
  color: #333;
  letter-spacing: .06em;
}
</style>
</head>
<body>
<div class="container">
  <h1>Under construction</h1>
  <div>
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
  </div>
  <p style="margin-top:1.8rem">ericssongraciolli.com</p>
</div>
</body>
</html>
